<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusofy - Concierge</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='70' r='20' stroke='%23ffcf00' stroke-width='3' fill='none'/%3E%3Cline x1='50' y1='45' x2='50' y2='25' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='50' y1='45' x2='30' y2='30' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='50' y1='45' x2='70' y2='30' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='50' y1='45' x2='20' y2='45' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='50' y1='45' x2='80' y2='45' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='50' y1='45' x2='25' y2='55' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='50' y1='45' x2='75' y2='55' stroke='%23ffcf00' stroke-width='3'/%3E%3Cline x1='15' y1='70' x2='85' y2='70' stroke='%23ffcf00' stroke-width='3'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --lusotur-blue: #041f43;
            --lusotur-yellow: #ffcf00;
            --lusotur-white: #ffffff;
            --bg-primary: #041f43;
            --bg-secondary: #062a5a;
            --bg-card: #0a3570;
            --bg-column: #031632;
            --text-primary: #ffffff;
            --text-secondary: #b8c7db;
            --text-muted: #7a8fa8;
            --border-color: #1a4a7a;
            --accent: #ffcf00;
            --accent-hover: #ffe14d;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); 
            min-height: 100vh; 
            color: var(--text-primary); 
            overflow: hidden;
        }
        h1, h2, h3, h4, h5, h6, .title-font { font-family: 'Oswald', sans-serif; }
        
        .header { 
            background: rgba(4, 31, 67, 0.98); 
            backdrop-filter: blur(10px); 
            border-bottom: 3px solid var(--accent); 
            padding: 0 24px; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 100; 
        }
        .header-logo { display: flex; align-items: center; gap: 12px; }
        .header-logo h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .header-logo .version { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--text-muted); background: var(--bg-card); padding: 3px 10px; border-radius: 4px; font-weight: 500; }
        .header-nav { display: flex; gap: 8px; }
        .nav-btn { font-family: 'Oswald', sans-serif; padding: 10px 20px; border-radius: 6px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; background: transparent; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; text-decoration: none; }
        .nav-btn:hover { background: rgba(255, 207, 0, 0.1); color: var(--text-primary); border-color: rgba(255, 207, 0, 0.3); }
        .nav-btn.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); font-weight: 600; }
        .header-profile { display: flex; align-items: center; gap: 12px; }
        .profile-btn { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-radius: 8px; background: var(--bg-card); border: 2px solid var(--border-color); color: var(--text-primary); cursor: pointer; transition: all 0.2s ease; font-family: 'Montserrat', sans-serif; font-weight: 500; text-decoration: none; }
        .profile-btn:hover { border-color: var(--accent); background: rgba(255, 207, 0, 0.1); }
        .profile-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: var(--bg-primary); }
        .logo-sun { width: 36px; height: 36px; color: var(--accent); }
        
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 70px;
            position: relative;
        }
        
        .em-breve-text {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(255, 207, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 60px;
        }
        
        /* Monstrinho */
        .monster-container {
            position: absolute;
            width: 200px;
            height: 280px;
            transition: left 0.3s ease-out, top 0.3s ease-out;
            cursor: pointer;
            z-index: 10;
        }
        
        .monster {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* Corpo do monstrinho */
        .monster-body {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 140px;
            background: linear-gradient(180deg, var(--accent) 0%, #e6ba00 100%);
            border-radius: 60px 60px 50px 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: bodyBounce 0.5s ease-in-out infinite;
        }
        
        @keyframes bodyBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        /* Olhos */
        .monster-eyes {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        
        .monster-eye {
            width: 35px;
            height: 40px;
            background: white;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .monster-pupil {
            position: absolute;
            width: 15px;
            height: 18px;
            background: var(--bg-primary);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease-out;
        }
        
        .monster-pupil::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            top: 3px;
            right: 2px;
        }
        
        /* Boca */
        .monster-mouth {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: var(--bg-primary);
            border-radius: 0 0 40px 40px;
            overflow: hidden;
        }
        
        .monster-tongue {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 10px 10px 0 0;
            animation: tongueLick 2s ease-in-out infinite;
        }
        
        @keyframes tongueLick {
            0%, 80%, 100% { height: 12px; }
            90% { height: 18px; }
        }
        
        /* Antenas */
        .monster-antenna {
            position: absolute;
            top: -20px;
            width: 6px;
            height: 35px;
            background: var(--accent);
            border-radius: 3px;
        }
        
        .monster-antenna.left {
            left: 35px;
            transform: rotate(-15deg);
        }
        
        .monster-antenna.right {
            right: 35px;
            transform: rotate(15deg);
        }
        
        .monster-antenna::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: var(--bg-primary);
            border-radius: 50%;
            border: 3px solid var(--accent);
        }
        
        /* Pernas */
        .monster-legs {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
        }
        
        .monster-leg {
            width: 25px;
            height: 45px;
            background: linear-gradient(180deg, #e6ba00 0%, var(--accent) 100%);
            border-radius: 0 0 15px 15px;
            position: relative;
        }
        
        .monster-leg.left {
            animation: legLeft 0.5s ease-in-out infinite;
        }
        
        .monster-leg.right {
            animation: legRight 0.5s ease-in-out infinite;
        }
        
        @keyframes legLeft {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        
        @keyframes legRight {
            0%, 100% { transform: rotate(5deg); }
            50% { transform: rotate(-5deg); }
        }
        
        .monster-foot {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 12px;
            background: var(--bg-primary);
            border-radius: 10px;
        }
        
        /* Braços */
        .monster-arms {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            display: flex;
            justify-content: space-between;
        }
        
        .monster-arm {
            width: 20px;
            height: 50px;
            background: linear-gradient(180deg, var(--accent) 0%, #e6ba00 100%);
            border-radius: 10px;
        }
        
        .monster-arm.left {
            transform: rotate(30deg);
            transform-origin: top center;
        }
        
        .monster-arm.right {
            transform: rotate(-30deg);
            transform-origin: top center;
            animation: holdSign 1s ease-in-out infinite;
        }
        
        @keyframes holdSign {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(-25deg); }
        }
        
        /* Placa */
        .sign-container {
            position: absolute;
            top: -30px;
            right: -80px;
            transform: rotate(5deg);
            animation: signSwing 2s ease-in-out infinite;
        }
        
        @keyframes signSwing {
            0%, 100% { transform: rotate(5deg); }
            50% { transform: rotate(-2deg); }
        }
        
        .sign {
            background: var(--bg-card);
            border: 4px solid var(--accent);
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            position: relative;
        }
        
        .sign::before {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 30px;
            background: #8B4513;
            border-radius: 4px;
        }
        
        .sign-text {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        /* Efeito de brilho no monstrinho */
        .monster-body::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 20px;
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        
        /* Bochechas */
        .monster-cheeks {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            display: flex;
            justify-content: space-between;
        }
        
        .monster-cheek {
            width: 20px;
            height: 12px;
            background: rgba(255, 150, 150, 0.5);
            border-radius: 50%;
        }
        
        /* Partículas de brilho */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: sparkle 2s ease-in-out infinite;
        }
        
        .sparkle:nth-child(1) { top: -10px; left: 20px; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 0px; right: 10px; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { top: 20px; left: -5px; animation-delay: 1s; }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        /* Instrução */
        .instruction {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 1s ease-out 0.5s both;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .instruction svg {
            animation: mouseMove 1.5s ease-in-out infinite;
        }
        
        @keyframes mouseMove {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-logo">
            <svg class="logo-sun" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="70" r="20" stroke="currentColor" stroke-width="3" fill="none"/>
                <line x1="50" y1="45" x2="50" y2="25" stroke="currentColor" stroke-width="3"/>
                <line x1="50" y1="45" x2="30" y2="30" stroke="currentColor" stroke-width="3"/>
                <line x1="50" y1="45" x2="70" y2="30" stroke="currentColor" stroke-width="3"/>
                <line x1="50" y1="45" x2="20" y2="45" stroke="currentColor" stroke-width="3"/>
                <line x1="50" y1="45" x2="80" y2="45" stroke="currentColor" stroke-width="3"/>
                <line x1="50" y1="45" x2="25" y2="55" stroke="currentColor" stroke-width="3"/>
                <line x1="50" y1="45" x2="75" y2="55" stroke="currentColor" stroke-width="3"/>
                <line x1="15" y1="70" x2="85" y2="70" stroke="currentColor" stroke-width="3"/>
            </svg>
            <h1>LUSOFY</h1>
            <span class="version">Beta 1.5</span>
        </div>
        <nav class="header-nav">
            <a href="index.html" class="nav-btn">Gestão de Reservas</a>
            <a href="pages/concierge.html" class="nav-btn active">Concierge</a>
        </nav>
        <div class="header-profile" style="display:flex;gap:8px;">
            <a href="https://plataforma.upperfy.com.br/" target="_blank" class="profile-btn" style="text-decoration:none;">
                <div class="profile-avatar">U</div>
                <span>Meu Perfil</span>
            </a>
        </div>
    </header>
    
    <main class="main-content">
        <h2 class="em-breve-text">Em Breve</h2>
        <p class="subtitle">Estamos preparando algo incrível para você!</p>
        
        <div class="monster-container" id="monster">
            <div class="monster">
                <!-- Partículas de brilho -->
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                
                <!-- Antenas -->
                <div class="monster-body">
                    <div class="monster-antenna left"></div>
                    <div class="monster-antenna right"></div>
                    
                    <!-- Olhos -->
                    <div class="monster-eyes">
                        <div class="monster-eye">
                            <div class="monster-pupil" id="pupilLeft"></div>
                        </div>
                        <div class="monster-eye">
                            <div class="monster-pupil" id="pupilRight"></div>
                        </div>
                    </div>
                    
                    <!-- Bochechas -->
                    <div class="monster-cheeks">
                        <div class="monster-cheek"></div>
                        <div class="monster-cheek"></div>
                    </div>
                    
                    <!-- Boca -->
                    <div class="monster-mouth">
                        <div class="monster-tongue"></div>
                    </div>
                </div>
                
                <!-- Braços -->
                <div class="monster-arms">
                    <div class="monster-arm left"></div>
                    <div class="monster-arm right"></div>
                </div>
                
                <!-- Pernas -->
                <div class="monster-legs">
                    <div class="monster-leg left">
                        <div class="monster-foot"></div>
                    </div>
                    <div class="monster-leg right">
                        <div class="monster-foot"></div>
                    </div>
                </div>
                
                <!-- Placa -->
                <div class="sign-container">
                    <div class="sign">
                        <span class="sign-text">Em Breve!</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="instruction">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
            Mova o mouse para brincar com o Lusofy!
        </div>
    </main>
    
    <script>
        const monster = document.getElementById('monster');
        const pupilLeft = document.getElementById('pupilLeft');
        const pupilRight = document.getElementById('pupilRight');
        
        let monsterX = window.innerWidth / 2 - 100;
        let monsterY = window.innerHeight / 2 - 100;
        let targetX = monsterX;
        let targetY = monsterY;
        
        monster.style.left = monsterX + 'px';
        monster.style.top = monsterY + 'px';
        
        document.addEventListener('mousemove', function(e) {
            // Atualiza posição alvo do monstrinho (segue o mouse com delay)
            targetX = e.clientX - 100;
            targetY = e.clientY - 140;
            
            // Limita dentro da tela
            targetX = Math.max(0, Math.min(window.innerWidth - 200, targetX));
            targetY = Math.max(80, Math.min(window.innerHeight - 280, targetY));
            
            // Move os olhos para seguir o mouse
            const monsterRect = monster.getBoundingClientRect();
            const monsterCenterX = monsterRect.left + monsterRect.width / 2;
            const monsterCenterY = monsterRect.top + 100;
            
            const angleLeft = Math.atan2(e.clientY - monsterCenterY, e.clientX - (monsterCenterX - 15));
            const angleRight = Math.atan2(e.clientY - monsterCenterY, e.clientX - (monsterCenterX + 15));
            
            const maxMove = 6;
            
            const leftX = Math.cos(angleLeft) * maxMove;
            const leftY = Math.sin(angleLeft) * maxMove;
            const rightX = Math.cos(angleRight) * maxMove;
            const rightY = Math.sin(angleRight) * maxMove;
            
            pupilLeft.style.transform = `translate(calc(-50% + ${leftX}px), calc(-50% + ${leftY}px))`;
            pupilRight.style.transform = `translate(calc(-50% + ${rightX}px), calc(-50% + ${rightY}px))`;
        });
        
        // Animação suave do monstrinho seguindo o mouse
        function animateMonster() {
            const speed = 0.05;
            
            monsterX += (targetX - monsterX) * speed;
            monsterY += (targetY - monsterY) * speed;
            
            monster.style.left = monsterX + 'px';
            monster.style.top = monsterY + 'px';
            
            // Inclina levemente na direção do movimento
            const deltaX = targetX - monsterX;
            const rotation = Math.max(-10, Math.min(10, deltaX * 0.1));
            monster.style.transform = `rotate(${rotation}deg)`;
            
            requestAnimationFrame(animateMonster);
        }
        
        animateMonster();
        
        // Clique no monstrinho
        monster.addEventListener('click', function() {
            monster.style.transition = 'transform 0.2s ease';
            monster.style.transform = 'scale(1.1) rotate(0deg)';
            setTimeout(() => {
                monster.style.transform = 'scale(1) rotate(0deg)';
            }, 200);
        });
    </script>
</body>
</html>
